kind = "web"
previewPath = "/"
title = "ResumeForge AI"
version = "1.0.0"
id = "artifacts/resume-forge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20274

[services.development]
run = "pnpm --filter @workspace/resume-forge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-forge", "run", "build" ]
publicDir = "artifacts/resume-forge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20274"
BASE_PATH = "/"
